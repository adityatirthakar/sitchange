<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login or register to Sitchange - Exchange tickets and seats with other travelers.">
  <title>Sitchange — Login / Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">Sit<span>change</span></a>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="form-container">
      <div class="form-card">

        <!-- Login Form -->
        <div id="loginForm">
          <h2>Welcome Back</h2>
          <p class="subtitle">Sign in to your account</p>
          <div class="form-error" id="loginError"></div>
          <form id="loginFormEl">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="loginBtn">
              Sign In
            </button>
          </form>
          <div class="form-toggle">
            Don't have an account? <a onclick="toggleForm('register')">Register</a>
          </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none">
          <h2>Create Account</h2>
          <p class="subtitle">Join the ticket exchange community</p>
          <div class="form-error" id="registerError"></div>
          <form id="registerFormEl">
            <div class="form-group">
              <label for="regName">Full Name</label>
              <input type="text" id="regName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label for="regEmail">Email</label>
              <input type="email" id="regEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label for="regPassword">Password</label>
              <input type="password" id="regPassword" placeholder="At least 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="registerBtn">
              Create Account
            </button>
          </form>
          <div class="form-toggle">
            Already have an account? <a onclick="toggleForm('login')">Sign In</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
