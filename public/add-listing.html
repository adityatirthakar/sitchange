<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add a new ticket listing on Sitchange.">
  <title>Sitchange — Add Listing</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">Sit<span>change</span></a>
      <ul class="navbar-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="add-listing.html" class="active">Add Listing</a></li>
        <li><a href="my-listings.html">My Listings</a></li>
        <li id="authNavItem"><a href="auth.html" class="nav-btn">Login</a></li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="form-container" style="max-width:600px">
      <div class="form-card">
        <h2>List Your Ticket</h2>
        <p class="subtitle">Fill in the details of the ticket you want to exchange</p>

        <div class="form-error" id="formError"></div>
        <div class="form-success" id="formSuccess"></div>

        <form id="addListingForm">
          <div class="form-group">
            <label for="ticketType">Ticket Type</label>
            <select id="ticketType" required>
              <option value="">Select type...</option>
              <option value="Train">🚆 Train</option>
              <option value="Bus">🚌 Bus</option>
              <option value="Flight">✈️ Flight</option>
              <option value="Movie">🎬 Movie</option>
              <option value="Concert">🎵 Concert</option>
              <option value="Hotel">🏨 Hotel</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="source">Source / Venue</label>
              <input type="text" id="source" placeholder="e.g. Mumbai">
            </div>
            <div class="form-group">
              <label for="destination">Destination</label>
              <input type="text" id="destination" placeholder="e.g. Delhi">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date">
            </div>
            <div class="form-group">
              <label for="seatDetails">Seat Details</label>
              <input type="text" id="seatDetails" placeholder="e.g. Coach S4, Seat 32">
            </div>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Describe what you're looking to exchange..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="submitBtn">
            Publish Listing
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/addListing.js"></script>
</body>
</html>
